<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flappy Bird CSS</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#222;
}

.game{
    position:relative;
    width:400px;
    height:700px;
    overflow:hidden;
    border-radius:20px;
    background:linear-gradient(#6ec6ff,#dff6ff);
}

/* Oiseau */
.bird{
    position:absolute;
    left:80px;
    width:50px;
    height:40px;
    background:gold;
    border-radius:50%;
    animation:fly 1s ease-in-out infinite;
}

@keyframes fly{
    0%{top:250px;}
    50%{top:180px;}
    100%{top:250px;}
}

/* Tuyaux */
.pipe{
    position:absolute;
    width:70px;
    background:linear-gradient(#43a047,#1b5e20);
    right:-100px;
    animation:movePipe 4s linear infinite;
}

.pipe.top{
    height:220px;
    top:0;
}

.pipe.bottom{
    height:260px;
    bottom:0;
}

.pipe2{
    animation-delay:2s;
}

@keyframes movePipe{
    from{
        right:-100px;
    }
    to{
        right:500px;
    }
}

/* Sol */
.ground{
    position:absolute;
    bottom:0;
    width:100%;
    height:40px;
    background:#7a5230;
}
</style>
</head>
<body>

<div class="game">

    <div class="bird"></div>

    <div class="pipe top"></div>
    <div class="pipe bottom"></div>

    <div class="pipe pipe2 top" style="height:160px"></div>
    <div class="pipe pipe2 bottom" style="height:320px"></div>

    <div class="ground"></div>

</div>

</body>
</html>
